server:
  port: 8300
spring:
  application:
    name: spring-ai-mcp-weather-client
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.5
    mcp:
      client:
        enabled: true
        name: mcp-weather-client
        version: 1.0.0
        type: SYNC
        request-timeout: 60s
        # SSE 传输配置（官方推荐方式）
        sse:
          connections:
            weather-server:
              url: http://localhost:8181
              sse-endpoint: /sse
  main:
    allow-circular-references: true
